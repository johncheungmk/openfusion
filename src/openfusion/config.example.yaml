# OpenFusion v0.2 configuration.
# After `openfusion init --path openfusion.yaml`, edit openfusion.yaml (not this template)
# and make each model name match the model server you actually use.
providers:
  - name: local-ollama
    type: openai_compatible
    enabled: true
    base_url: http://localhost:11434/v1
    api_key_env:
    model: llama3.2:3b
    timeout_seconds: 300
    weight: 1.0
    headers: {}

  - name: local-lmstudio
    type: openai_compatible
    enabled: false
    base_url: http://localhost:1234/v1
    api_key_env:
    model: local-model
    timeout_seconds: 300
    weight: 1.0
    headers: {}

  - name: cloud-openai
    type: openai_compatible
    enabled: false
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4.1-mini
    timeout_seconds: 120
    weight: 1.2
    headers: {}

  - name: cloud-openrouter
    type: openai_compatible
    enabled: false
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: openai/gpt-4.1-mini
    timeout_seconds: 120
    weight: 1.0
    headers:
      HTTP-Referer: https://github.com/johncheungmk/openfusion
      X-Title: OpenFusion

fusion:
  # Supported: fallback, parallel_synthesis, best_of_n, majority_vote,
  # weighted_vote, critique_revision, layered_refinement, adaptive.
  default_strategy: parallel_synthesis
  panel: [local-ollama]

  # These roles may use the same model or different specialist models.
  judge_provider: local-ollama
  critic_provider: local-ollama
  reviser_provider: local-ollama
  planner_provider:

  max_parallel: 2
  max_total_calls: 8
  samples_per_provider: 1
  refinement_rounds: 1

  temperature: 0.2
  judge_temperature: 0.1
  critique_temperature: 0.1
  max_tokens: 256

  require_at_least_successes: 1
  include_candidate_outputs: true
  include_workflow_outputs: true
  judge_candidate_max_chars: 4000
  transcript_max_chars: 12000
  vote_answer_regex:

  # False uses transparent local heuristics for adaptive mode. True spends one
  # model call on a constrained JSON planner before executing the chosen workflow.
  adaptive_use_model_planner: false

server:
  host: 127.0.0.1
  port: 8000
  api_key_env: OPENFUSION_API_KEY
