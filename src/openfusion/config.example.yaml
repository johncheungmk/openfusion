# Copy this file to openfusion.yaml and adjust providers.
# Any provider exposing /v1/chat/completions can be used: Ollama, LM Studio, vLLM,
# llama.cpp server, Dify-compatible gateways, OpenRouter, OpenAI, Azure proxy, etc.
#
# Important:
# - Runtime settings are read from openfusion.yaml.
# - Create it with: openfusion init --path openfusion.yaml
# - Then edit openfusion.yaml so provider model names match your installed models.
# - For Ollama, run `ollama list` and use one of the listed model names.

providers:
  - name: local-ollama
    type: openai_compatible
    enabled: true
    base_url: http://localhost:11434/v1
    api_key_env: OLLAMA_API_KEY
    # Pull this lightweight model with: ollama pull llama3.2:3b
    # Or replace it with any exact model name shown by: ollama list
    model: llama3.2:3b
    timeout_seconds: 300
    weight: 1.0

  - name: local-lmstudio
    type: openai_compatible
    enabled: false
    base_url: http://localhost:1234/v1
    api_key_env: LMSTUDIO_API_KEY
    model: local-model
    timeout_seconds: 120
    weight: 1.0

  - name: cloud-openai
    type: openai_compatible
    enabled: false
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    model: gpt-4.1-mini
    timeout_seconds: 90
    weight: 1.0

  - name: cloud-openrouter
    type: openai_compatible
    enabled: false
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: openai/gpt-4.1-mini
    timeout_seconds: 90
    weight: 1.0
    headers:
      HTTP-Referer: https://github.com/johncheungmk/openfusion
      X-Title: OpenFusion

fusion:
  default_strategy: panel_judge
  panel:
    - local-ollama
  # Start with one enabled local provider so the example works after Ollama is running.
  # Add local-lmstudio, cloud-openai, or cloud-openrouter here after enabling them above.
  judge_provider: local-ollama
  max_parallel: 1
  temperature: 0.2
  max_tokens: 256
  require_at_least_successes: 1
  include_candidate_outputs: true
  # Candidate outputs are truncated before judge synthesis to keep prompts bounded.
  judge_candidate_max_chars: 4000

server:
  host: 127.0.0.1
  port: 8000
  # Optional. If set, callers must send Authorization: Bearer <OPENFUSION_API_KEY>.
  api_key_env: OPENFUSION_API_KEY
