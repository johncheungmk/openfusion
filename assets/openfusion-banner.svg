<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">OpenFusion banner</title>
  <desc id="desc">OpenFusion: open-source API-level model fusion gateway for local and cloud LLMs</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050b18"/>
      <stop offset="48%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#160d2e"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="36%" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fusionLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fusionLine2" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="32" fill="url(#centerGlow)"/>

  <!-- Subtle network background -->
  <g opacity="0.14" stroke="#60a5fa" stroke-width="1" fill="none">
    <path d="M36 82 C168 132 250 70 378 120 S600 242 746 156 936 76 1164 126"/>
    <path d="M72 286 C210 224 324 258 448 184 S672 88 810 150 968 252 1130 206"/>
    <path d="M0 206 C150 178 260 220 390 190 S560 122 690 148 850 232 1002 190 1112 138 1200 150"/>
  </g>
  <g opacity="0.22" fill="#38bdf8">
    <circle cx="84" cy="96" r="3"/><circle cx="198" cy="112" r="3"/><circle cx="358" cy="126" r="3"/>
    <circle cx="842" cy="148" r="3"/><circle cx="982" cy="94" r="3"/><circle cx="1120" cy="130" r="3"/>
    <circle cx="140" cy="278" r="3"/><circle cx="1012" cy="210" r="3"/><circle cx="1156" cy="206" r="3"/>
  </g>

  <!-- Abstract fusion stream: no third-party logos -->
  <g filter="url(#glow)" opacity="0.95">
    <path d="M250 146 C385 72 465 238 600 180 C735 122 815 288 950 214" fill="none" stroke="url(#fusionLine)" stroke-width="9" stroke-linecap="round" opacity="0.96"/>
    <path d="M250 214 C385 288 465 122 600 180 C735 238 815 72 950 146" fill="none" stroke="url(#fusionLine2)" stroke-width="9" stroke-linecap="round" opacity="0.96"/>
    <path d="M270 180 C410 126 470 126 600 180 C730 234 790 234 930 180" fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
    <circle cx="600" cy="180" r="13" fill="#e0f2fe" opacity="0.95"/>
    <circle cx="600" cy="180" r="36" fill="#38bdf8" opacity="0.13"/>
  </g>

  <!-- Text block: separated from visual stream to avoid overlap -->
  <g filter="url(#softShadow)">
    <text x="600" y="282" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="800" fill="#f8fafc" letter-spacing="-1.8">OpenFusion</text>
    <text x="600" y="322" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" fill="#bfdbfe" letter-spacing="0.3">Open-source API-level model fusion gateway</text>
  </g>
</svg>
